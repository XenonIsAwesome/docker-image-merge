version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - revive
    - staticcheck
    - unused
    - ineffassign

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "disableStutteringCheck"
        - name: package-comments
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    paths:
      - tests

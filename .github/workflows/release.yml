name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          mkdir -p dist

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o dist/docker-imagemerge-linux-amd64 .

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o dist/docker-imagemerge-linux-arm64 .

          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o dist/docker-imagemerge-darwin-amd64 .

          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o dist/docker-imagemerge-darwin-arm64 .

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o dist/docker-imagemerge-windows-amd64.exe .

          # Checksums
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/docker-imagemerge-*
            dist/checksums.txt

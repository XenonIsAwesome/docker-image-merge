name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o dist/docker-image-merge-linux-amd64 .

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o dist/docker-image-merge-linux-arm64 .

          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o dist/docker-image-merge-darwin-amd64 .

          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o dist/docker-image-merge-darwin-arm64 .

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o dist/docker-image-merge-windows-amd64.exe .

          # Checksums
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/docker-image-merge-*
            dist/checksums.txt

      - name: Build and push Docker image
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker build -t ghcr.io/${{ github.repository }}:${VERSION} .
          docker tag ghcr.io/${{ github.repository }}:${VERSION} ghcr.io/${{ github.repository }}:latest
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}:${VERSION}
          docker push ghcr.io/${{ github.repository }}:latest

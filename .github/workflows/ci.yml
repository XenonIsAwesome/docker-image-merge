name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build -trimpath -ldflags='-s -w' -o docker-imagemerge .

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -v ./internal/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: go build -trimpath -ldflags='-s -w' -o docker-imagemerge .

      - name: Integration tests
        run: go test -tags=integration -v -timeout=300s ./tests/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t docker-imagemerge:ci .

      - name: Smoke test
        run: docker run --rm docker-imagemerge:ci --help
